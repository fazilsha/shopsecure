name: ShopSecure CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  AWS_REGION: ap-south-1

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - run: pip install -r requirements.txt
      - name: Package Lambda functions
        run: |
          mkdir -p dist
          for svc in auth-service product-service order-service; do
            mkdir -p pkg_temp
            cp services/$svc/app.py pkg_temp/
            pip install -r requirements.txt -t pkg_temp -q
            cd pkg_temp
            zip -r ../dist/${svc}.zip . -q
            cd ..
            rm -rf pkg_temp
            echo "Packaged $svc"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: lambda-zips
          path: dist/*.zip

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt pytest pytest-cov
      - run: pytest tests/ -v --cov=services --cov-fail-under=60

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install bandit pip-audit checkov
      - run: bandit -r services/ -f json -o bandit.json || true
      - run: pip-audit --format=json --output=pip-audit.json || true
      - run: checkov -d terraform/ --framework terraform -o json --output-file checkov.json --quiet || true
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: "*.json"

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: lambda-zips
          path: dist/
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_STAGING_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform init and apply
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=staging/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"
          terraform apply -auto-approve -var="environment=staging"
      - name: Deploy Lambda code
        run: |
          for svc in auth-service product-service order-service; do
            aws lambda update-function-code \
              --function-name shopsecure-staging-$svc \
              --zip-file fileb://dist/$svc.zip
            aws lambda wait function-updated \
              --function-name shopsecure-staging-$svc
          done

  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: deploy-staging
    permissions:
      id-token: write
      contents: read
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: lambda-zips
          path: dist/
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform init and apply
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"
          terraform apply -auto-approve -var="environment=production"
      - name: Deploy Lambda code
        run: |
          for svc in auth-service product-service order-service; do
            aws lambda update-function-code \
              --function-name shopsecure-prod-$svc \
              --zip-file fileb://dist/$svc.zip
            aws lambda wait function-updated \
              --function-name shopsecure-prod-$svc
          done
